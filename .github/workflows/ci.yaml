name: NoSecurity.dev CoffeeShop CI

on:
  - push
  - pull_request

jobs:
  ci:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v3

      - name: Run Tests
        run: |
          make test

      - name: Build
        run: |
          make build
